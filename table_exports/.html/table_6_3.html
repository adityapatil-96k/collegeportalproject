<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Table 6.3</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f5f7fb;
      color: #0f172a;
    }
    .card {
      background: #ffffff;
      border: 1px solid #dbe1ea;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.06);
      overflow: hidden;
      width: 1600px;
    }
    .title {
      padding: 16px 20px;
      background: #0f172a;
      color: #ffffff;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.3;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 16px;
    }
    th, td {
      border: 1px solid #e2e8f0;
      padding: 10px 12px;
      vertical-align: top;
      text-align: left;
      line-height: 1.35;
    }
    th {
      background: #eaf1ff;
      color: #0b3ea8;
      font-weight: 700;
    }
    tr:nth-child(even) td { background: #fafcff; }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Table 6.3 — API Endpoints for Notifications</div>
    <table>
      <thead><tr><th>Method</th><th>Endpoint</th><th>Purpose</th></tr></thead>
      <tbody><tr><td>GET</td><td>/notifications</td><td>Fetch student notifications + unread count</td></tr><tr><td>PUT</td><td>/notifications/read/:id</td><td>Mark notification as read</td></tr><tr><td>POST</td><td>/bookmarks</td><td>Create bookmark (student)</td></tr><tr><td>GET</td><td>/bookmarks</td><td>List student bookmarks</td></tr><tr><td>DELETE</td><td>/bookmarks/:id</td><td>Remove bookmark</td></tr></tbody>
    </table>
  </div>
</body>
</html>
